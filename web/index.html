<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculadora 3D Print Studio - custos, insumos e orçamentos">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="KDA3D">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Inter: preload via CSS (evita google_fonts em runtime no Dart) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <title>KDA3D — Calculadora 3D</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0E1116;
      font-family: Inter, system-ui, sans-serif;
    }
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0E1116;
      color: #ABB3C0;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #2A3140;
      border-top-color: #5B8DEF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <div class="spinner"></div>
    <div>Carregando calculadora…</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var s = document.getElementById('splash');
      if (s) { s.classList.add('hidden'); setTimeout(function () { s.remove(); }, 350); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
